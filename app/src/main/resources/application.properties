# ===============================
# CineTrack - Conexion MySQL XAMPP
# ===============================
# Usamos 127.0.0.1 para evitar rechazos por resolucion localhost/IPv6 en Windows.
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:${MYSQL_PORT:3306}}/${DB_NAME:${MYSQL_DATABASE:cinetrack_db}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:${MYSQL_USER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQL_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Evita inicializaciones automaticas de SQL de Spring.
spring.sql.init.mode=never

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.cache=false

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=520MB


