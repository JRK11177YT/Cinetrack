# ===============================
# CineTrack - Configuracion BASE
# ===============================
# Este archivo define valores para PRODUCCION.
# Para desarrollo local, usa application-dev.properties (activa con SPRING_PROFILES_ACTIVE=dev).
#
# Las credenciales de BD se inyectan SIEMPRE desde variables de entorno.
# En produccion son obligatorias. En dev, application-dev.properties las sobreescribe.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
# En produccion: validate (no modificar esquema automaticamente).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# Evita inicializaciones automaticas de SQL de Spring.
spring.sql.init.mode=never

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.cache=true

# ===============================
# Perfil activo
# ===============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# ===============================
# Remember-me (prod: requiere variable de entorno REMEMBER_ME_KEY)
# ===============================
remember.me.key=${REMEMBER_ME_KEY:}

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=520MB


