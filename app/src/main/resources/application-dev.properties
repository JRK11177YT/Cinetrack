# Mostrar SQL generado por Hibernate (útil en desarrollo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar caché de Thymeleaf para ver cambios sin reiniciar
spring.thymeleaf.cache=false
