<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>CineTrack - Gestión de Géneros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light" style="background-color: #141414 !important;">

<!-- Inyectar Navbar -->
<div th:replace="~{fragments/navbar :: menuGlobal}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white">🏷️ Gestión de Categorías</h2>
        <button class="btn btn-outline-danger">+ Nuevo Género</button>
    </div>

    <div class="row">
        <div class="col-md-8 mx-auto">
            <ul class="list-group list-group-flush shadow-sm">
                <li th:each="genero : ${generos}" class="list-group-item bg-secondary text-light d-flex justify-content-between align-items-center border-dark">
                    <div>
                        <h5 class="mb-1 text-warning fw-bold" th:text="${genero.nombre}">Acción</h5>
                        <small class="text-white-50" th:text="${genero.descripcion}">Descripción de prueba...</small>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-dark">Ver Pelis</button>
                        <button class="btn btn-sm btn-outline-info">Editar</button>
                    </div>
                </li>
                
                <li th:if="${#lists.isEmpty(generos)}" class="list-group-item bg-secondary text-center text-muted">
                    No has creado ningún género todavía.
                </li>
            </ul>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
