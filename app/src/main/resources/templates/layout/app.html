<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      lang="es">
<head>
    <title layout:title-pattern="$CONTENT_TITLE | CineTrack">CineTrack</title>
</head>
<body>
<div layout:fragment="body">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand ct-navbar" id="mainNavbar">
        <div class="container-fluid px-3 px-lg-4">
            <!-- Brand -->
            <a class="navbar-brand ct-brand" th:href="@{/inicio}">CineTrack</a>

            <!-- Nav links -->
            <ul class="navbar-nav me-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/inicio}"
                       th:classappend="${currentUri != null and #strings.startsWith(currentUri, '/inicio')} ? 'active'">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/sugerencias}"
                       th:classappend="${currentUri != null and #strings.startsWith(currentUri, '/sugerencias')} ? 'active'">Mis Sugerencias</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/mi-lista}"
                       th:classappend="${currentUri != null and #strings.startsWith(currentUri, '/mi-lista')} ? 'active'">Mi Lista</a>
                </li>
            </ul>

            <!-- Buscador navbar -->
            <form th:action="@{/buscar}" method="get" class="navbar-search me-3">
                <div class="navbar-search__wrap">
                    <input type="text"
                           name="q"
                           class="navbar-search__input"
                           placeholder="Buscar..."
                           autocomplete="off"
                           maxlength="100"/>
                    <button type="submit" class="navbar-search__btn" title="Buscar">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </form>

            <!-- Profile dropdown -->
            <div class="dropdown profile-dropdown">
                <button class="dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <div th:if="${perfilActivo != null and perfilActivo.avatarUrl != null and #strings.startsWith(perfilActivo.avatarUrl, 'custom:')}"
                         class="profile-avatar" style="padding:0;">
                        <img th:src="@{'/uploads/avatars/' + ${#strings.substringAfter(perfilActivo.avatarUrl, 'custom:')}}"
                             alt="Avatar"/>
                    </div>
                    <div th:unless="${perfilActivo != null and perfilActivo.avatarUrl != null and #strings.startsWith(perfilActivo.avatarUrl, 'custom:')}"
                         class="profile-avatar"
                         th:classappend="'avatar--' + (${perfilActivo != null ? perfilActivo.avatarUrl : 'default'} ?: 'default')"
                         th:text="${perfilActivo != null and perfilActivo.nombre != null ? #strings.substring(perfilActivo.nombre, 0, 1) : '?'}">
                    </div>
                    <span class="d-none d-md-inline text-light small" th:text="${perfilActivo != null ? perfilActivo.nombre : ''}"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li th:if="${esAdmin}">
                        <a class="dropdown-item" th:href="@{/admin}">
                            <i class="fas fa-shield-alt"></i> Panel Admin
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" th:href="@{/perfiles}">
                            <i class="fas fa-users"></i> Cambiar Perfil
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" th:href="@{/perfiles/gestionar}">
                            <i class="fas fa-user-cog"></i> Gestionar Perfiles
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" th:href="@{/cuenta}">
                            <i class="fas fa-cog"></i> Mi Cuenta
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="dropdown-item">
                                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main layout:fragment="content"></main>

    <!-- FOOTER -->
    <footer class="ct-footer">
        <div class="ct-footer__inner">
            <!-- Izquierda: vacío (balance visual) -->
            <div class="ct-footer__col ct-footer__col--left"></div>

            <!-- Centro: marca + copyright -->
            <div class="ct-footer__col ct-footer__col--center">
                <span class="ct-brand ct-footer__brand">CINETRACK</span>
                <p class="ct-footer__copy">&copy; 2026 CineTrack &mdash; Proyecto Académico</p>
            </div>

            <!-- Derecha: autor -->
            <div class="ct-footer__col ct-footer__col--right">
                <p class="ct-footer__author">
                    <span class="ct-footer__author-label">Realizado por</span>
                    <span class="ct-footer__author-name">Jorge Ruiz</span>
                </p>
            </div>
        </div>
    </footer>

</div>
</body>
</html>
