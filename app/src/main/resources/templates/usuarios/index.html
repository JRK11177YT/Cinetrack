<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>CineTrack - Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light" style="background-color: #141414 !important;">

<!-- Inyectar Navbar -->
<div th:replace="~{fragments/navbar :: menuGlobal}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white">🧑‍💻 Gestión de Usuarios</h2>
        <button class="btn btn-outline-light">+ Registrar Usuario</button>
    </div>

    <div class="card bg-secondary text-light">
        <div class="card-body">
            <table class="table table-dark table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${usuarios}">
                    <td th:text="${user.id}">1</td>
                    <td class="fw-bold" th:text="${user.nombre}">Usuario</td>
                    <td th:text="${user.email}">correo@test.com</td>
                    <td><span class="badge bg-info text-dark" th:text="${user.rol}">USER</span></td>
                    <td>
                        <span th:if="${user.activo}" class="badge bg-success">Activo</span>
                        <span th:unless="${user.activo}" class="badge bg-danger">Inactivo</span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-warning">Editar</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="6" class="text-center text-muted">No existen usuarios en la plataforma.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
