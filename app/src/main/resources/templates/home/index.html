<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/app}"
      lang="es">
<head>
    <title>Inicio</title>
</head>
<body>
<main layout:fragment="content">

    <!-- ====== HERO BANNER ====== -->
    <section class="hero" th:if="${heroMovie}">
        <div class="hero__bg"
             th:style="'background-color: #1a1a2e;'">
        </div>
        <div class="hero__overlay"></div>
        <div class="hero__content animate-fadeInUp">
            <div class="hero__badge">
                <i class="fas fa-fire"></i> Destacada
            </div>
            <h1 class="hero__title" th:text="${heroMovie.titulo}">Título</h1>
            <div class="hero__meta">
                <span class="hero__meta-badge" th:text="${heroMovie.genero.nombre}">Género</span>
                <span th:text="${heroMovie.anio}">2024</span>
                <span th:text="${heroMovie.duracion} + ' min'">120 min</span>
            </div>
            <p class="hero__description" th:text="${heroMovie.descripcion}">Descripción...</p>
            <div class="hero__buttons">
                <a th:href="@{/pelicula/{id}(id=${heroMovie.id})}" class="btn btn--play">
                    <i class="fas fa-play"></i> Reproducir
                </a>
                <a th:href="@{/pelicula/{id}(id=${heroMovie.id})}" class="btn btn--info">
                    <i class="fas fa-info-circle"></i> Más Información
                </a>
            </div>
        </div>
    </section>

    <!-- ====== CONTENT ROWS ====== -->
    <div class="content-section">

        <!-- Seguir Viendo -->
        <section class="movie-row" th:if="${!seguirViendo.isEmpty()}">
            <h2 class="movie-row__title">
                <i class="fas fa-history" style="color: var(--accent); margin-right: 8px;"></i>
                Seguir Viendo
            </h2>
            <div class="movie-row__container">
                <button class="movie-row__arrow movie-row__arrow--left">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="movie-row__slider">
                    <div th:each="historial : ${seguirViendo}" class="movie-card">
                        <a th:href="@{/pelicula/{id}(id=${historial.pelicula.id})}" style="display:block; width:100%; height:100%; text-decoration:none; color:inherit;">
                            <div class="movie-card__poster"
                                 th:classappend="'movie-card__poster--' + ${#strings.toLowerCase(#strings.replace(historial.pelicula.genero.nombre, ' ', '-'))}">
                                <span th:text="${historial.pelicula.titulo}">Título</span>
                            </div>
                            <div class="movie-card__progress">
                                <div class="movie-card__progress-bar"
                                     th:style="'width:' + ${(historial.progresoSegundos * 100) / (historial.pelicula.duracion * 60)} + '%'">
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
                <button class="movie-row__arrow movie-row__arrow--right">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <!-- Destacadas / Top CineTrack -->
        <section class="movie-row" th:if="${!destacadas.isEmpty()}">
            <h2 class="movie-row__title">
                <i class="fas fa-star" style="color: #F59E0B; margin-right: 8px;"></i>
                Top CineTrack
            </h2>
            <div class="movie-row__container">
                <button class="movie-row__arrow movie-row__arrow--left">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="movie-row__slider">
                    <div th:each="pelicula : ${destacadas}" class="movie-card">
                        <a th:href="@{/pelicula/{id}(id=${pelicula.id})}" style="display:block; width:100%; height:100%; text-decoration:none; color:inherit;">
                            <div class="movie-card__poster"
                                 th:classappend="'movie-card__poster--' + ${#strings.toLowerCase(#strings.replace(pelicula.genero.nombre, ' ', '-'))}">
                                <span th:text="${pelicula.titulo}">Título</span>
                            </div>
                            <div class="movie-card__overlay">
                                <div class="movie-card__title" th:text="${pelicula.titulo}">Título</div>
                                <div class="movie-card__info">
                                    <span th:text="${pelicula.anio}">2024</span>
                                    <span th:text="${pelicula.duracion} + 'min'">120min</span>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
                <button class="movie-row__arrow movie-row__arrow--right">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <!-- Películas por Género -->
        <section th:each="entry : ${peliculasPorGenero}" class="movie-row">
            <h2 class="movie-row__title" th:text="${entry.key.nombre}">Género</h2>
            <div class="movie-row__container">
                <button class="movie-row__arrow movie-row__arrow--left">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="movie-row__slider">
                    <div th:each="pelicula : ${entry.value}" class="movie-card">
                        <a th:href="@{/pelicula/{id}(id=${pelicula.id})}" style="display:block; width:100%; height:100%; text-decoration:none; color:inherit;">
                            <div class="movie-card__poster"
                                 th:classappend="'movie-card__poster--' + ${#strings.toLowerCase(#strings.replace(entry.key.nombre, ' ', '-'))}">
                                <span th:text="${pelicula.titulo}">Título</span>
                            </div>
                            <div class="movie-card__overlay">
                                <div class="movie-card__title" th:text="${pelicula.titulo}">Título</div>
                                <div class="movie-card__info">
                                    <span th:text="${pelicula.anio}">2024</span>
                                    <span th:text="${pelicula.duracion} + 'min'">120min</span>
                                </div>
                                <div class="movie-card__actions">
                                    <button class="btn btn--icon" title="Reproducir">
                                        <i class="fas fa-play"></i>
                                    </button>
                                    <button class="btn btn--icon" data-milista-toggle
                                            th:data-pelicula-id="${pelicula.id}"
                                            title="Mi Lista">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
                <button class="movie-row__arrow movie-row__arrow--right">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </section>

    </div>

</main>
</body>
</html>
