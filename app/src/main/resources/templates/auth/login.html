<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      lang="es">
<head>
    <title>Iniciar Sesión</title>
</head>
<body>
<div layout:fragment="body">
    <div class="auth-page">
        <div class="auth-page__bg"></div>

        <header class="auth-header">
            <a href="/login" class="navbar__logo" style="font-family: var(--font-heading); font-size: 2rem; font-weight: 800; color: #E50914; text-transform: uppercase; text-decoration: none;">
                CineTrack
            </a>
        </header>

        <div class="auth-content">
            <div class="auth-card animate-fadeInUp">
                <h1 class="auth-card__title">Iniciar Sesión</h1>

                <div th:if="${error}" class="form-error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}">Error</span>
                </div>

                <div th:if="${mensaje}" class="form-success">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${mensaje}">Mensaje</span>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <input type="email" name="email" class="form-input"
                               placeholder="Email" required autofocus>
                    </div>

                    <div class="form-group" style="position: relative;">
                        <input type="password" name="password" class="form-input"
                               placeholder="Contraseña" required>
                        <button type="button" class="toggle-password"
                                style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer;">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div class="form-check">
                        <input type="checkbox" name="recuerdame" id="recuerdame">
                        <label for="recuerdame">Recuérdame</label>
                    </div>

                    <button type="submit" class="btn btn--accent btn--full btn--lg">
                        Iniciar Sesión
                    </button>

                    <p class="form-footer" style="margin-top: 24px;">
                        ¿Nuevo en CineTrack?
                        <a th:href="@{/registro}">Regístrate ahora</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
