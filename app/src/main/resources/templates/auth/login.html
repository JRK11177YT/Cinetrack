<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Iniciar Sesión — CINETRACK</title>
</head>
<body>
<div layout:fragment="body">

    <div class="auth-page">
        <!-- Animated background -->
        <div class="auth-bg">
            <div class="auth-bg__gradient"></div>
            <div class="auth-bg__particles" id="authParticles"></div>
        </div>

        <!-- Top bar -->
        <div class="auth-topbar">
            <a href="/" class="ct-brand">CINETRACK</a>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">

                    <div class="auth-card" id="loginCard">
                        <!-- Glow accent -->
                        <div class="auth-card__glow"></div>

                        <h1 class="auth-card__title">Bienvenido de nuevo</h1>
                        <p class="auth-card__subtitle">Inicia sesión para continuar viendo</p>

                        <!-- Error Alert -->
                        <div th:if="${param.error}" class="auth-alert auth-alert--error">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span>Email o contraseña incorrectos</span>
                        </div>

                        <!-- Logout Alert -->
                        <div th:if="${param.logout}" class="auth-alert auth-alert--success">
                            <i class="fas fa-check-circle"></i>
                            <span>Has cerrado sesión correctamente</span>
                        </div>

                        <!-- Login Form -->
                        <form th:action="@{/login}" method="post" autocomplete="on" class="auth-form">

                            <div class="auth-field">
                                <div class="auth-field__input-wrap">
                                    <i class="fas fa-envelope auth-field__icon"></i>
                                    <input type="email" id="email" name="email"
                                           class="auth-field__input"
                                           placeholder=" "
                                           required autofocus autocomplete="email">
                                    <label for="email" class="auth-field__label">Email</label>
                                </div>
                            </div>

                            <div class="auth-field">
                                <div class="auth-field__input-wrap">
                                    <i class="fas fa-lock auth-field__icon"></i>
                                    <input type="password" id="password" name="password"
                                           class="auth-field__input"
                                           placeholder=" "
                                           required autocomplete="current-password">
                                    <label for="password" class="auth-field__label">Contraseña</label>
                                    <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <label class="auth-checkbox">
                                    <input type="checkbox" name="remember-me">
                                    <span class="auth-checkbox__mark"></span>
                                    <span class="auth-checkbox__text">Recuérdame</span>
                                </label>
                            </div>

                            <button type="submit" class="auth-submit">
                                <span class="auth-submit__text">Iniciar Sesión</span>
                                <i class="fas fa-arrow-right auth-submit__arrow"></i>
                            </button>
                        </form>

                        <div class="auth-footer">
                            <span>¿Primera vez aquí?</span>
                            <a th:href="@{/registro}" class="auth-footer__link">Crea tu cuenta</a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
