<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>CineTrack - Catálogo de Películas</title>
    <!-- Bootstrap 5 (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light" style="background-color: #141414 !important;">

<!-- Inyectamos nuestro fragmento de menú -->
<div th:replace="~{fragments/navbar :: menuGlobal}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white">Catálogo de Películas</h2>
        <button class="btn btn-danger">+ Nueva Película</button>
    </div>

    <!-- Estilo de tarjetas (Grid tipo Netflix) -->
    <div class="row row-cols-1 row-cols-md-4 g-4 mt-3">
        <div class="col" th:each="peli : ${peliculas}">
            <div class="card h-100 bg-secondary border-0 text-white shadow-sm">
                <!-- Imagen placeholder -->
                <img src="https://via.placeholder.com/300x450/444/FFF?text=Sin+Imagen" class="card-img-top" alt="Poster">
                <div class="card-body">
                    <h5 class="card-title text-warning fw-bold" th:text="${peli.titulo}">Título Prueba</h5>
                    <span class="badge bg-danger mb-2" th:text="${peli.genero != null ? peli.genero.nombre : 'Sin Categoría'}">Género</span>
                    <p class="card-text small text-light" th:text="${peli.descripcion}" style="display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden;">Descripción resumida...</p>
                </div>
                <div class="card-footer bg-dark border-0">
                    <small th:text="'⌛ ' + ${peli.duracion} + ' min | 📅 ' + ${peli.anio}"></small>
                </div>
            </div>
        </div>
        
        <div th:if="${#lists.isEmpty(peliculas)}" class="col-12 w-100">
            <div class="alert alert-dark text-center">No hay películas en la base de datos...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
