<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>CineTrack - Catálogo de Pruebas</title>
    <!-- Bootstrap 5 (CDN) para tener un estilo profesional mínimo rápido -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <h1 class="mb-4 text-warning">🤖 Entorno de Pruebas - CineTrack</h1>
    <p class="lead">Esta página lee directamente desde tu MySQL usando Spring Boot y Thymeleaf.</p>

    <div class="card bg-secondary text-light">
        <div class="card-body">
            <table class="table table-dark table-hover mt-3">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Género</th>
                    <th>Duración (min)</th>
                    <th>Año</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <!-- Bucle de Thymeleaf: Por cada 'peli' en la lista 'peliculas' creamos una fila -->
                <tr th:each="peli : ${peliculas}">
                    <td th:text="${peli.id}">1</td>
                    <td class="fw-bold" th:text="${peli.titulo}">Título Prueba</td>
                    
                    <!-- Fíjate cómo navegamos al objeto Género. ¡Esto es el poder de JPA! -->
                    <td th:text="${peli.genero != null ? peli.genero.nombre : 'Sin género'}">Acción</td>
                    
                    <td th:text="${peli.duracion}">120</td>
                    <td th:text="${peli.anio}">2024</td>
                    <td>
                        <button class="btn btn-sm btn-outline-info">Ver detalle (Próximamente)</button>
                    </td>
                </tr>
                <!-- Fila vacía en caso de que no haya pelis -->
                <tr th:if="${#lists.isEmpty(peliculas)}">
                    <td colspan="6" class="text-center text-muted">No hay películas en la base de datos...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
