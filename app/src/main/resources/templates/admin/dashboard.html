<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}"
      lang="es">
<head>
    <title>Dashboard</title>
</head>
<body>
<div layout:fragment="admin-content">

    <div class="admin-page-header">
        <h1 class="admin-page-title">Dashboard</h1>
        <p class="admin-page-subtitle">Resumen general de CineTrack</p>
    </div>

    <!-- STATS -->
    <div class="admin-stats">
        <div class="admin-stat-card">
            <div class="admin-stat-card__icon"><i class="fas fa-film"></i></div>
            <div class="admin-stat-card__info">
                <span class="admin-stat-card__number" th:text="${totalPeliculas}">0</span>
                <span class="admin-stat-card__label">Películas</span>
            </div>
        </div>
        <div class="admin-stat-card">
            <div class="admin-stat-card__icon admin-stat-card__icon--users"><i class="fas fa-users"></i></div>
            <div class="admin-stat-card__info">
                <span class="admin-stat-card__number" th:text="${totalUsuarios}">0</span>
                <span class="admin-stat-card__label">Usuarios</span>
            </div>
        </div>
        <div class="admin-stat-card">
            <div class="admin-stat-card__icon admin-stat-card__icon--genres"><i class="fas fa-tags"></i></div>
            <div class="admin-stat-card__info">
                <span class="admin-stat-card__number" th:text="${totalGeneros}">0</span>
                <span class="admin-stat-card__label">Géneros</span>
            </div>
        </div>
    </div>

    <!-- ACCESOS RÁPIDOS -->
    <div class="admin-section">
        <h2 class="admin-section-title">Acciones rápidas</h2>
        <div class="admin-quick-actions">
            <a th:href="@{/admin/peliculas/nueva}" class="admin-quick-btn">
                <i class="fas fa-plus-circle"></i>
                <span>Nueva Película</span>
            </a>
            <a th:href="@{/admin/generos/nuevo}" class="admin-quick-btn">
                <i class="fas fa-tag"></i>
                <span>Nuevo Género</span>
            </a>
            <a th:href="@{/admin/usuarios}" class="admin-quick-btn">
                <i class="fas fa-user-check"></i>
                <span>Ver Usuarios</span>
            </a>
        </div>
    </div>

    <!-- PELÍCULAS RECIENTES -->
    <div class="admin-section">
        <h2 class="admin-section-title">Últimas películas añadidas</h2>
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Género</th>
                        <th>Año</th>
                        <th>Destacada</th>
                        <th>Novedad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${peliculasRecientes}">
                        <td th:text="${p.titulo}">—</td>
                        <td th:text="${p.genero?.nombre}">—</td>
                        <td th:text="${p.anio}">—</td>
                        <td>
                            <span th:if="${p.destacada}" class="admin-badge admin-badge--green">Sí</span>
                            <span th:unless="${p.destacada}" class="admin-badge admin-badge--gray">No</span>
                        </td>
                        <td>
                            <span th:if="${p.novedad}" class="admin-badge admin-badge--red"><i class="fas fa-bolt me-1"></i>Sí</span>
                            <span th:unless="${p.novedad}" class="admin-badge admin-badge--gray">No</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/peliculas/editar/{id}(id=${p.id})}" class="admin-btn admin-btn--sm">
                                <i class="fas fa-pen"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(peliculasRecientes)}">
                        <td colspan="6" style="text-align:center; color: var(--text-secondary);">No hay películas todavía</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <a th:href="@{/admin/peliculas}" class="admin-btn" style="margin-top:16px; display:inline-block;">
            Ver todas las películas
        </a>
    </div>

</div>
</body>
</html>
