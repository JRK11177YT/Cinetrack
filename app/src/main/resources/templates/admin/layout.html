<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title layout:title-pattern="$CONTENT_TITLE | Admin CineTrack">Admin</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CineTrack CSS -->
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body class="admin-body" data-bs-theme="dark">

<div class="d-flex min-vh-100">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar d-flex flex-column flex-shrink-0" id="adminSidebar">
        <div class="admin-sidebar__brand px-3 py-4 text-center">
            <span class="ct-brand fs-5">CineTrack</span>
            <span class="badge bg-danger ms-2 align-middle">Admin</span>
        </div>

        <nav class="nav flex-column flex-grow-1 px-2 gap-1">
            <a th:href="@{/admin}"
               th:classappend="${#strings.startsWith(currentUri ?: '', '/admin') and !(#strings.startsWith(currentUri ?: '', '/admin/peliculas') or #strings.startsWith(currentUri ?: '', '/admin/usuarios') or #strings.startsWith(currentUri ?: '', '/admin/generos'))} ? 'active'"
               class="nav-link admin-nav-link rounded-3">
                <i class="fas fa-th-large me-2"></i>
                <span>Dashboard</span>
            </a>
            <a th:href="@{/admin/peliculas}"
               th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/peliculas')} ? 'active'"
               class="nav-link admin-nav-link rounded-3">
                <i class="fas fa-film me-2"></i>
                <span>Películas</span>
            </a>
            <a th:href="@{/admin/usuarios}"
               th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/usuarios')} ? 'active'"
               class="nav-link admin-nav-link rounded-3">
                <i class="fas fa-users me-2"></i>
                <span>Usuarios</span>
            </a>
            <a th:href="@{/admin/generos}"
               th:classappend="${#strings.startsWith(currentUri ?: '', '/admin/generos')} ? 'active'"
               class="nav-link admin-nav-link rounded-3">
                <i class="fas fa-tags me-2"></i>
                <span>Géneros</span>
            </a>
        </nav>

        <div class="admin-sidebar__footer px-2 pb-3 d-flex flex-column gap-1">
            <a th:href="@{/inicio}" class="nav-link admin-nav-link admin-nav-link--muted rounded-3">
                <i class="fas fa-arrow-left me-2"></i>
                <span>Volver a CineTrack</span>
            </a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="nav-link admin-nav-link admin-nav-link--logout rounded-3 w-100 bg-transparent border-0 text-start">
                    <i class="fas fa-sign-out-alt me-2"></i>
                    <span>Cerrar Sesión</span>
                </button>
            </form>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-content flex-grow-1 overflow-auto">
        <div class="container-fluid p-4">
            <div layout:fragment="admin-content"></div>
        </div>
    </main>

</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
