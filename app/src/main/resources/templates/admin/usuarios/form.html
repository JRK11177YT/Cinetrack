<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}"
      lang="es">
<head>
    <title>Editar Usuario</title>
</head>
<body>
<div layout:fragment="admin-content">

    <div class="admin-page-header">
        <div>
            <h1 class="admin-page-title">Editar Usuario</h1>
            <p class="admin-page-subtitle" th:text="${usuario.email}">email</p>
        </div>
        <a th:href="@{/admin/usuarios}" class="admin-btn">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </div>

    <div class="admin-form-card">
        <form th:action="@{/admin/usuarios/editar/{id}(id=${usuario.id})}" method="post" class="admin-form">

            <!-- Email (solo lectura) -->
            <div class="admin-form-group">
                <label>Email</label>
                <input type="email" class="admin-input" th:value="${usuario.email}" readonly disabled style="opacity: 0.5; cursor: not-allowed;"/>
            </div>

            <!-- Plan -->
            <div class="admin-form-group">
                <label for="plan">Plan de suscripción</label>
                <select id="plan" name="plan" class="admin-input admin-input--select">
                    <option value="BASICO" th:selected="${usuario.plan == 'BASICO'}">BASICO — hasta 2 perfiles</option>
                    <option value="ESTANDAR" th:selected="${usuario.plan == 'ESTANDAR'}">ESTANDAR — hasta 3 perfiles</option>
                    <option value="PREMIUM" th:selected="${usuario.plan == 'PREMIUM'}">PREMIUM — hasta 5 perfiles</option>
                </select>
            </div>

            <!-- Rol -->
            <div class="admin-form-group">
                <label for="rol">Rol</label>
                <select id="rol" name="rol" class="admin-input admin-input--select">
                    <option value="USER" th:selected="${usuario.rol == 'USER'}">USER — Usuario estándar</option>
                    <option value="ADMIN" th:selected="${usuario.rol == 'ADMIN'}">ADMIN — Administrador</option>
                </select>
            </div>

            <!-- Activo -->
            <div class="admin-form-group admin-form-group--checkbox">
                <label class="admin-checkbox-label">
                    <input type="checkbox" name="activo" value="true" th:checked="${usuario.activo}"/>
                    <span>Cuenta activa (el usuario puede iniciar sesión)</span>
                </label>
            </div>

            <!-- Nueva contraseña (opcional) -->
            <div class="admin-form-group">
                <label for="nuevaPassword">Nueva contraseña <small style="color:var(--text-secondary);">(dejar en blanco para no cambiar)</small></label>
                <input type="password" id="nuevaPassword" name="nuevaPassword" class="admin-input"
                       minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
            </div>

            <div class="admin-form-actions">
                <button type="submit" class="admin-btn admin-btn--accent">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
                <a th:href="@{/admin/usuarios}" class="admin-btn">Cancelar</a>
            </div>
        </form>
    </div>

</div>
</body>
</html>
