<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      lang="es">
<head>
    <title>Mi Cuenta — CINETRACK</title>
</head>
<body>
<div layout:fragment="body">
    <div class="cuenta-page reveal">

        <!-- Header -->
        <div class="cuenta-header">
            <a th:href="@{/perfiles}" class="cuenta-header__back">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="cuenta-header__title">Mi Cuenta</h1>
        </div>

        <!-- Flash messages -->
        <div th:if="${mensaje}" class="alert alert-success d-flex align-items-center gap-2 py-2 mb-3" role="alert"
             style="max-width:700px; margin:0 auto 24px;">
            <i class="fas fa-check-circle"></i>
            <span th:text="${mensaje}">OK</span>
        </div>
        <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3" role="alert"
             style="max-width:700px; margin:0 auto 24px;">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}">Error</span>
        </div>

        <div class="cuenta-sections">

            <!-- Account Info -->
            <section class="cuenta-section reveal" style="transition-delay: 0.1s;">
                <h2 class="cuenta-section__title">
                    <i class="fas fa-user"></i> Información de la Cuenta
                </h2>
                <div class="cuenta-section__body">
                    <div class="cuenta-field">
                        <span class="cuenta-field__label">Correo electrónico</span>
                        <span class="cuenta-field__value" th:text="${usuario.email}">email@ejemplo.com</span>
                    </div>
                    <div class="cuenta-field">
                        <span class="cuenta-field__label">Miembro desde</span>
                        <span class="cuenta-field__value"
                              th:text="${#temporals.format(usuario.fechaRegistro, 'dd MMMM yyyy')}">01 enero 2024</span>
                    </div>
                    <div class="cuenta-field">
                        <span class="cuenta-field__label">Rol</span>
                        <span class="cuenta-field__value">
                            <span class="badge bg-danger" th:text="${usuario.rol}">USER</span>
                        </span>
                    </div>
                </div>
            </section>

            <!-- Subscription -->
            <section class="cuenta-section reveal" style="transition-delay: 0.2s;">
                <h2 class="cuenta-section__title">
                    <i class="fas fa-crown"></i> Suscripción
                </h2>
                <div class="cuenta-section__body">
                    <div class="cuenta-plan-cards">
                        <form th:action="@{/cuenta/plan}" method="post">
                            <div class="cuenta-plan-grid">
                                <label th:each="p : ${ {'BASICO','ESTANDAR','PREMIUM'} }"
                                       class="cuenta-plan-option"
                                       th:classappend="${usuario.plan == p} ? 'cuenta-plan-option--active' : ''">
                                    <input type="radio" name="plan" th:value="${p}" th:checked="${usuario.plan == p}" class="d-none"/>
                                    <div class="cuenta-plan-option__content">
                                        <span class="cuenta-plan-option__name" th:text="${p}">PLAN</span>
                                        <span class="cuenta-plan-option__profiles"
                                              th:text="${p == 'BASICO' ? '2 perfiles' : (p == 'ESTANDAR' ? '3 perfiles' : '5 perfiles')}">
                                            2 perfiles
                                        </span>
                                        <span class="cuenta-plan-option__price"
                                              th:text="${p == 'BASICO' ? '7,99 €/mes' : (p == 'ESTANDAR' ? '12,99 €/mes' : '17,99 €/mes')}">
                                            7,99 €/mes
                                        </span>
                                    </div>
                                </label>
                            </div>
                            <button type="submit" class="btn-ct-accent mt-3">
                                Cambiar Plan
                            </button>
                        </form>
                    </div>
                </div>
            </section>

            <!-- Change Password -->
            <section class="cuenta-section reveal" style="transition-delay: 0.3s;">
                <h2 class="cuenta-section__title">
                    <i class="fas fa-lock"></i> Cambiar Contraseña
                </h2>
                <div class="cuenta-section__body">
                    <form th:action="@{/cuenta/password}" method="post" class="cuenta-password-form">
                        <div class="ct-form-group">
                            <label for="passwordActual" class="form-label">Contraseña actual</label>
                            <input type="password" id="passwordActual" name="passwordActual"
                                   class="ct-input" required autocomplete="current-password"/>
                        </div>
                        <div class="ct-form-group">
                            <label for="passwordNueva" class="form-label">Nueva contraseña</label>
                            <input type="password" id="passwordNueva" name="passwordNueva"
                                   class="ct-input" required minlength="6" autocomplete="new-password"/>
                        </div>
                        <div class="ct-form-group">
                            <label for="passwordConfirmar" class="form-label">Confirmar nueva contraseña</label>
                            <input type="password" id="passwordConfirmar" name="passwordConfirmar"
                                   class="ct-input" required minlength="6" autocomplete="new-password"/>
                        </div>
                        <button type="submit" class="btn-ct-accent">Cambiar Contraseña</button>
                    </form>
                </div>
            </section>

            <!-- Logout -->
            <section class="cuenta-section reveal" style="transition-delay: 0.4s;">
                <div class="cuenta-section__body text-center py-4">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn-ct-danger btn-lg">
                            <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
                        </button>
                    </form>
                </div>
            </section>

        </div>
    </div>
</div>
</body>
</html>
