<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      lang="es">
<head>
    <title>¿Quién está viendo? — CINETRACK</title>
</head>
<body>
<div layout:fragment="body">

    <!-- Account bar -->
    <div class="account-bar">
        <div class="account-bar__info">
            <i class="fas fa-user-circle"></i>
            <span th:text="${emailCuenta}">email@ejemplo.com</span>
        </div>
        <div class="account-bar__actions">
            <a th:href="@{/cuenta}" class="account-bar__link">
                <i class="fas fa-cog"></i> Mi Cuenta
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline m-0">
                <button type="submit" class="account-bar__link account-bar__logout">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </form>
        </div>
    </div>

    <div class="profiles-scene">
        <div class="profiles-scene__bg"></div>

        <h1 class="profiles-scene__title">¿Quién está viendo?</h1>

        <div class="profiles-scene__grid">
            <div th:each="perfil, iter : ${perfiles}"
                 class="profile-item"
                 th:style="'--delay:' + ${iter.index * 0.12} + 's'">
                <form th:action="@{/perfiles/seleccionar/{id}(id=${perfil.id})}" method="post" class="d-inline">
                    <button type="submit" class="profile-item__btn">
                        <!-- Custom avatar -->
                        <div class="profile-item__avatar"
                             th:if="${perfil.avatarUrl != null and #strings.startsWith(perfil.avatarUrl, 'custom:')}">
                            <img th:src="@{'/uploads/avatars/' + ${#strings.substringAfter(perfil.avatarUrl, 'custom:')}}"
                                 alt="Avatar"/>
                        </div>
                        <!-- Preset avatar -->
                        <div class="profile-item__avatar"
                             th:unless="${perfil.avatarUrl != null and #strings.startsWith(perfil.avatarUrl, 'custom:')}"
                             th:classappend="'avatar--' + ${perfil.avatarUrl ?: 'default'}">
                            <span th:text="${#strings.substring(perfil.nombre, 0, 1)}">A</span>
                        </div>
                        <span class="profile-item__name" th:text="${perfil.nombre}">Perfil</span>
                    </button>
                </form>
            </div>

            <!-- Add profile -->
            <div th:if="${puedeCrearMas}" class="profile-item" style="--delay: 0.5s;">
                <a th:href="@{/registro/perfil}" class="profile-item__btn profile-item__btn--add">
                    <div class="profile-item__avatar profile-item__avatar--add">
                        <i class="fas fa-plus"></i>
                    </div>
                    <span class="profile-item__name">Añadir</span>
                </a>
            </div>
        </div>

        <a th:href="@{/perfiles/gestionar}" class="profiles-scene__manage">
            <i class="fas fa-pen me-2"></i>Gestionar Perfiles
        </a>
    </div>

</div>
</body>
</html>
